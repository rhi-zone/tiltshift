# tiltshift built-in magic byte corpus
#
# Sources: file-type (sindresorhus), Wikipedia list of file signatures,
# ~/git/lua/lib/mimetype/by_contents.lua, and manual additions.
#
# Format:
#   [[format]]
#   name  = "Human-readable label"
#   magic = "hex bytes, space-separated"
#   mime  = "mime/type"          # optional

# ── Images ───────────────────────────────────────────────────────────────────

[[format]]
name = "PNG"
magic = "89 50 4e 47 0d 0a 1a 0a"
mime = "image/png"

[[format]]
name = "JPEG"
magic = "ff d8 ff"
mime = "image/jpeg"

[[format]]
name = "GIF87a"
magic = "47 49 46 38 37 61"
mime = "image/gif"

[[format]]
name = "GIF89a"
magic = "47 49 46 38 39 61"
mime = "image/gif"

[[format]]
name = "BMP"
magic = "42 4d"
mime = "image/bmp"

[[format]]
name = "Photoshop PSD"
